<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>WRO 2026 賽事管理系統 (日期雲端同步版)</title>
    <style>
        :root { --bg: #0d0d0d; --panel: #1a1a1a; --text: #ffffff; --highlight: #00ffcc; --accent: #ffcc00; }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: var(--panel); padding: 25px; border-radius: 15px; border: 2px solid var(--highlight); position: relative; }
        .country-select { position: absolute; top: 20px; right: 20px; background: #333; color: white; padding: 5px; border: 1px solid var(--highlight); border-radius: 5px; width: 150px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { background-color: var(--highlight); color: #000; padding: 12px; }
        td { border: 1px solid #444; padding: 10px; text-align: center; }
        .sc { width: 50px; height: 40px; font-size: 1.2em; font-weight: bold; background: #222; color: #fff; border: 2px solid var(--highlight); text-align: center; }
        button { background-color: var(--accent); color: #000; border: none; padding: 10px 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin: 2px; }
        .sync-box { background: #222; padding: 10px; border-radius: 5px; margin-top: 10px; border: 1px dashed #ffcc00; }
        .sync-input { width: 70%; padding: 5px; background: #333; color: white; border: 1px solid var(--highlight); border-radius: 3px; }
    </style>
</head>
<body>

<div class="container">
    <select id="countrySelect" class="country-select">
        <option value="">選擇國家/地區</option>
        <option value="Taiwan">台灣</option>
    </select>

    <h2>⚡ WRO 2026 賽事管理系統 (日期雲端同步版)</h2>
    
    <div style="background: #262626; padding: 15px; border-radius: 10px; margin-bottom: 20px;">
        <span style="color:#00ffcc; font-weight:bold;">📅 比賽日期：</span>
        <input type="date" id="matchDate" style="padding:5px; background:#333; color:white; border:1px solid #00ffcc; border-radius:3px;">
        <input type="text" id="tName" placeholder="新隊伍名稱" onkeydown="if(event.key==='Enter') addTeam()">
        <button onclick="addTeam()">➕ 新增隊伍</button>
        <button onclick="shuffleMatches()" style="background:#ffcc00; color:#000;">🎲 隨機排列隊伍</button>
        <button onclick="resetScores()" style="background:#ff8800; color:#000;">🔄 成績歸零</button>
        <button onclick="saveMatch()" style="background:#00ffcc">💾 儲存並同步雲端</button>
        <button onclick="toggleHistory()" style="background:#4488ff; color:white;">📂 歷史紀錄</button>
        <button class="rule-btn" onclick="window.open('https://wro-association.org/wp-content/uploads/WRO-2026-RoboSports-Double-Tennis-General-Rules.pdf', '_blank')">📋 規則連結</button>
        <button onclick="deleteSelected()" style="background:#ff4444; color:white;">🗑️ 刪除勾選隊伍</button>

        <div class="sync-box">
            <span style="color:#ffcc00; font-weight:bold;">🔗 Google 雲端同步網址設定：</span>
            <input type="text" id="syncUrl" class="sync-input" placeholder="請貼上在 Google Apps Script 複製的部署網址 (以 /exec 結尾)">
        </div>
    </div>

    <div id="historyList" style="display:none; background:#333; padding:15px; border-radius:10px; margin-bottom:20px;">
        <h3>📜 歷史檔案室（點擊底線文字可直接載入查看紀錄）</h3>
        <div id="recordItems"></div>
        <button onclick="deleteSelectedHistory()" style="background:#ff4444; color:white; width:100%; margin-top:10px;">🗑️ 刪除勾選的歷史紀錄</button>
    </div>

    <h3>📊 積分排名</h3>
    <table id="statsTable"><thead><tr><th>刪除</th><th>隊伍</th><th>勝</th><th>敗</th><th>球</th><th>違規項目</th></tr></thead><tbody></tbody></table>

    <h3>⚔️ 對戰紀錄表</h3>
    <table id="matchTable"><thead><tr><th>對戰組合</th><th>回合 1</th><th>回合 2</th><th>回合 3</th></tr></thead><tbody></tbody></table>
</div>

<script>
    const countries = ["Afghanistan", "Albania", "Algeria", "Andorra", "Angola", "Antigua and Barbuda", "Argentina", "Armenia", "Australia", "Austria", "Azerbaijan", "Bahamas", "Bahrain", "Bangladesh", "Barbados", "Belarus", "Belgium", "Belize", "Benin", "Bhutan", "Bolivia", "Bosnia and Herzegovina", "Botswana", "Brazil", "Brunei", "Bulgaria", "Burkina Faso", "Burundi", "Cabo Verde", "Cambodia", "Cameroon", "Canada", "Central African Republic", "Chad", "Chile", "China", "Colombia", "Comoros", "Congo", "Costa Rica", "Croatia", "Cuba", "Cyprus", "Czechia", "Denmark", "Djibouti", "Dominica", "Dominican Republic", "Ecuador", "Egypt", "El Salvador", "Equatorial Guinea", "Eritrea", "Estonia", "Eswatini", "Ethiopia", "Fiji", "Finland", "France", "Gabon", "Gambia", "Georgia", "Germany", "Ghana", "Greece", "Grenada", "Guatemala", "Guinea", "Guinea-Bissau", "Guyana", "Haiti", "Honduras", "Hungary", "Iceland", "India", "Indonesia", "Iran", "Iraq", "Ireland", "Israel", "Italy", "Jamaica", "Japan", "Jordan", "Kazakhstan", "Kenya", "Kiribati", "Korea, North", "Korea, South", "Kuwait", "Kyrgyzstan", "Laos", "Latvia", "Lebanon", "Lesotho", "Liberia", "Libya", "Liechtenstein", "Lithuania", "Luxembourg", "Madagascar", "Malawi", "Malaysia", "Maldives", "Mali", "Malta", "Marshall Islands", "Mauritania", "Mauritius", "Mexico", "Micronesia", "Moldova", "Monaco", "Mongolia", "Montenegro", "Morocco", "Mozambique", "Myanmar", "Namibia", "Nauru", "Nepal", "Netherlands", "New Zealand", "Nicaragua", "Niger", "Nigeria", "North Macedonia", "Norway", "Oman", "Pakistan", "Palau", "Panama", "Papua New Guinea", "Paraguay", "Peru", "Philippines", "Poland", "Portugal", "Qatar", "Romania", "Russia", "Rwanda", "Saint Kitts and Nevis", "Saint Lucia", "Saint Vincent and the Grenadines", "Samoa", "San Marino", "Sao Tome and Principe", "Saudi Arabia", "Senegal", "Serbia", "Seychelles", "Sierra Leone", "Singapore", "Slovakia", "Slovenia", "Solomon Islands", "Somalia", "South Africa", "Spain", "Sri Lanka", "Sudan", "Suriname", "Sweden", "Switzerland", "Syria", "Tajikistan", "Tanzania", "Thailand", "Timor-Leste", "Togo", "Tonga", "Trinidad and Tobago", "Tunisia", "Turkey", "Turkmenistan", "Tuvalu", "Uganda", "Ukraine", "United Arab Emirates", "United Kingdom", "United States", "Uruguay", "Uzbekistan", "Vanuatu", "Vatican City", "Venezuela", "Vietnam", "Yemen", "Zambia", "Zimbabwe"];
    const select = document.getElementById('countrySelect');
    countries.forEach(c => {
        let opt = document.createElement('option');
        opt.value = c; opt.textContent = c;
        select.appendChild(opt);
    });

    let teams = [], matchesData = {}, matchOrder = [];
    const rules = ["無違規", "機器人踩紅線", "比賽期間觸碰機器", "未上場"];

    // 預設填入今天日期
    window.onload = function() {
        let today = new Date().toISOString().slice(0, 10);
        document.getElementById('matchDate').value = today;
        if(localStorage.getItem('wro_sync_url')) {
            document.getElementById('syncUrl').value = localStorage.getItem('wro_sync_url');
        }
    }

    function addTeam() {
        let input = document.getElementById('tName');
        let name = input.value.trim();
        if(name && !teams.find(t => t.name === name)) {
            teams.push({name, w:0, l:0, s:0, v:0, checked:false});
            input.value = ''; input.focus(); 
            buildMatchOrder();
            refresh();
        }
    }

    function buildMatchOrder() {
        let newOrder = [];
        for (let i = 0; i < teams.length; i++) {
            for (let j = i + 1; j < teams.length; j++) {
                newOrder.push({i, j});
            }
        }
        if (matchOrder.length === 0 || matchOrder.length !== newOrder.length) {
            matchOrder = newOrder;
        }
    }

    function shuffleMatches() {
        if (matchOrder.length < 2) {
            alert("隊伍數量不足，無法隨機排列！");
            return;
        }
        for (let i = matchOrder.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [matchOrder[i], matchOrder[j]] = [matchOrder[j], matchOrder[i]];
        }
        renderMatches();
        alert("🎲 對戰表隨機排列完成！順序已固定。");
    }

    function refresh() {
        let tbody = document.querySelector('#statsTable tbody');
        tbody.innerHTML = '';
        let sortedTeams = [...teams].sort((a,b) => b.w - a.w || b.s - a.s || b.v - a.v);
        sortedTeams.forEach(t => {
            let options = rules.map((r, i) => <option value="${i}" ${t.v==i?'selected':''}>${r}</option>).join('');
            tbody.innerHTML += `<tr>
                <td><input type="checkbox" onchange="toggleSelect('${t.name}')" ${t.checked ? 'checked' : ''}></td>
                <td>${t.name}</td><td>${t.w}</td><td>${t.l}</td><td>${t.s}</td>
                <td><select onchange="updateV('${t.name}', this.value)">${options}</select></td></tr>`;
        });
        renderMatches();
    }

    function renderMatches() {
        let mBody = document.querySelector('#matchTable tbody');
        mBody.innerHTML = '';
        buildMatchOrder();
        matchOrder.forEach(pair => {
            let t1 = teams[pair.i]; let t2 = teams[pair.j];
            if (!t1 || !t2) return;
            let key = ${pair.i}-${pair.j}, s = matchesData[key] || ['', '', '', '', '', ''];
            mBody.innerHTML += `<tr><td>${t1.name} vs ${t2.name}</td>
                <td><input type="number" class="sc" data-key="${key}" data-idx="0" value="${s[0]}">:<input type="number" class="sc" data-key="${key}" data-idx="1" value="${s[1]}"></td>
                <td><input type="number" class="sc" data-key="${key}" data-idx="2" value="${s[2]}">:<input type="number" class="sc" data-key="${key}" data-idx="3" value="${s[3]}"></td>
                <td><input type="number" class="sc" data-key="${key}" data-idx="4" value="${s[4]}">:<input type="number" class="sc" data-key="${key}" data-idx="5" value="${s[5]}"></td></tr>`;
        });
        document.querySelectorAll('.sc').forEach(el => el.addEventListener('input', calc));
    }

    function calc(e) {
        let key = e.target.dataset.key, idx = e.target.dataset.idx;
        if(!matchesData[key]) matchesData[key] = ['', '', '', '', '', ''];
        matchesData[key][idx] = e.target.value;
        teams.forEach(t => { t.w=0; t.l=0; t.s=0; });
        for(let k in matchesData) {
            let p = k.split('-'), t1 = teams[p[0]], t2 = teams[p[1]];
            if(!t1 || !t2) continue;
            let s = matchesData[k];
            for(let m=0; m<6; m+=2) {
                let v1 = parseInt(s[m]), v2 = parseInt(s[m+1]);
                if(!isNaN(v1)) t1.s += v1;
                if(!isNaN(v2)) t2.s += v2;
                if(!isNaN(v1) && !isNaN(v2)) {
                    if(v1 > v2) { t1.w++; t2.l++; }
                    else if(v2 > v1) { t2.w++; t1.l++; }
                }
            }
        }
        refresh();
    }
    
    function deleteSelected() { 
        let toDelete = teams.filter(t => t.checked).map(t => t.name);
        if (toDelete.length === 0) { alert("請先勾選要刪除的隊伍！"); return; }
        for (let k in matchesData) {
            let p = k.split('-'), t1 = teams[p[0]], t2 = teams[p[1]];
            if (!t1 || !t2 || toDelete.includes(t1.name) || toDelete.includes(t2.name)) { delete matchesData[k]; }
        }
        teams = teams.filter(t => !t.checked);
        matchOrder = [];
        fakeRecalc();
        refresh(); 
    }

    function fakeRecalc() {
        teams.forEach(t => { t.w=0; t.l=0; t.s=0; });
        for(let k in matchesData) {
            let p = k.split('-'), t1 = teams[p[0]], t2 = teams[p[1]];
            if(!t1 || !t2) continue;
            let s = matchesData[k];
            for(let m=0; m<6; m+=2) {
                let v1 = parseInt(s[m]), v2 = parseInt(s[m+1]);
                if(!isNaN(v1)) t1.s += v1;
                if(!isNaN(v2)) t2.s += v2;
                if(!isNaN(v1) && !isNaN(v2)) {
                    if(v1 > v2) { t1.w++; t2.l++; }
                    else if(v2 > v1) { t2.w++; t1.l++; }
                }
            }
        }
    }
    
    function resetScores() {
        if (teams.length === 0) { alert("目前沒有任何隊伍資料。"); return; }
        if (confirm("⚠️ 確定要將目前所有對戰成績歸零嗎？\n這會清除畫面上所有已輸入的分數，但會保留現有的隊伍名單與對戰組合。")) {
            matchesData = {};
            teams.forEach(t => { t.w = 0; t.l = 0; t.s = 0; });
            refresh();
            alert("🔄 所有成績已成功歸零！");
        }
    }
    
    function toggleSelect(name) { teams.find(x => x.name === name).checked = !teams.find(x => x.name === name).checked; }
    function updateV(name, val) { teams.find(t=>t.name===name).v = parseInt(val); refresh(); }
    
    function saveMatch() { 
        let inputs = document.querySelectorAll('.sc'); 
        for(let input of inputs) { if(input.value === "") { alert("請填寫所有對戰分數！"); return; } } 
        
        let matchDate = document.getElementById('matchDate').value || "未知日期";
        let countrySelect = document.getElementById('countrySelect').value || "未選擇";

        // 1. 本機快取
        let history = JSON.parse(localStorage.getItem('wro_records') || '[]'); 
        history.push({ 
            date: matchDate, country: countrySelect,
            teams, matchesData, matchOrder, selected: false 
        }); 
        localStorage.setItem('wro_records', JSON.stringify(history)); 
        
        // 2. 雲端同步（新增日期與國家）
        let syncUrl = document.getElementById('syncUrl').value.trim();
        if(syncUrl) {
            localStorage.setItem('wro_sync_url', syncUrl);
            
            let sortedTeams = [...teams].sort((a,b) => b.w - a.w || b.s - a.s || b.v - a.v);
            let matchOrderData = [];
            matchOrder.forEach(pair => {
                let t1 = teams[pair.i]; let t2 = teams[pair.j];
                if(!t1 || !t2) return;
                let key = ${pair.i}-${pair.j}, s = matchesData[key] || ['', '', '', '', '', ''];
                matchOrderData.push({
                    pair: ${t1.name} vs ${t2.name},
                    r1: ${s[0]}:${s[1]}, r2: ${s[2]}:${s[3]}, r3: ${s[4]}:${s[5]}
                });
            });
            
            let payload = {
                date: matchDate,
                country: countrySelect,
                sortedTeams: sortedTeams.map(t => ({name: t.name, w: t.w, l: t.l, s: t.s, vText: rules[t.v]})),
                matches: matchOrderData
            };
            
            fetch(syncUrl, {
                method: 'POST',
                mode: 'no-cors',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify(payload)
            });
            alert('💾 紀錄已儲存！\n🚀 Google Sheets 歷史總表已同步更新（已附帶日期欄位）！');
        } else {
            alert('💾 紀錄已儲存於本機！（因未填寫同步網址，未同步到雲端）');
        }
        if(document.getElementById('historyList').style.display === 'block') toggleHistory(); 
    }
    
    function toggleHistory() { 
        let list = document.getElementById('historyList'); 
        list.style.display = list.style.display === 'none' ? 'block' : 'none'; 
        let history = JSON.parse(localStorage.getItem('wro_records') || '[]'); 
        document.getElementById('recordItems').innerHTML = history.map((m, i) => `
            <div style="background:#222; padding:10px; margin:5px; border-left:4px solid #00ffcc; display:flex; align-items:center;">
                <input type="checkbox" onchange="toggleHistSelect(${i})" ${m.selected ? 'checked' : ''}>
                <span style="flex-grow:1; margin-left:10px; cursor:pointer; color:#00ffcc; text-decoration: underline; font-weight:bold;" onclick="loadRecord(${i})">
                    📅 日期：${m.date} | 🌍 地區：${m.country || '未選擇'} | 👥 隊伍數：${m.teams.length} 隊
                </span>
            </div>
        `).join(''); 
    }
    
    function toggleHistSelect(i) { let history = JSON.parse(localStorage.getItem('wro_records')); history[i].selected = !history[i].selected; localStorage.setItem('wro_records', JSON.stringify(history)); }
    function deleteSelectedHistory() { let history = JSON.parse(localStorage.getItem('wro_records') || '[]'); history = history.filter(m => !m.selected); localStorage.setItem('wro_records', JSON.stringify(history)); toggleHistory(); }
    
    function loadRecord(i) { 
        let history = JSON.parse(localStorage.getItem('wro_records')); 
        if(!history || !history[i]) return;
        document.getElementById('matchDate').value = history[i].date === "未知日期" ? "" : history[i].date;
        document.getElementById('countrySelect').value = history[i].country || "";
        teams = JSON.parse(JSON.stringify(history[i].teams)); 
        matchesData = JSON.parse(JSON.stringify(history[i].matchesData)); 
        matchOrder = JSON.parse(JSON.stringify(history[i].matchOrder || [])); 
        refresh(); 
        alert📂 已成功載入並還原歷史紀錄！`);
    }
</script>
</body>
</html>
